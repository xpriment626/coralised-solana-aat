edition = 3

[agent]
name = "solana-helius-dflow"
version = "0.1.0"
description = "Combined Helius + DFlow integration — trading apps with DFlow APIs and Helius infrastructure, Proof KYC, Sender, LaserStream, and wallet intelligence."

[agent.license]
type = "spdx"
expression = "MIT"

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"

[options.OPENAI_API_KEY]
type = "string"
required = true
secret = true

[options.OPENAI_API_KEY.display]
description = "OpenAI API key for gpt-5.4-mini"
