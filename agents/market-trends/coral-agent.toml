# market-trends — Coral capability atom.
# See docs/superpowers/plans/market-data-atoms.md and
# docs/superpowers/specs/2026-04-17-capability-atoms-agent-kit-compatibility-design.md.

edition = 4

[agent]
capabilities = ["resources", "tool_refreshing"]
name = "market-trends"
version = "0.1.0"
summary = "Discover current token and pool trends from CoinGecko (Solana)."
description = """
market-trends is the first Coral-launchable capability atom. It answers broad
market-discovery questions: trending tokens, trending pools, top gainers, and
the most recently listed pools on Solana. It does not resolve token identity
or pricing — it hands off to token-info, market-price, or oracle-price for
those questions.
"""
readme = "# market-trends\n\nCapability atom for Solana market discovery via CoinGecko. See repo README for composition details."

[agent.license]
type = "text"
text = "MIT"

[runtimes.executable]
transport = "streamable_http"
path = "npx"
arguments = ["--yes", "tsx", "index.ts"]

[options]

# --- Loop budget ---
MAX_ITERATIONS = { type = "u32", default = 20 }
ITERATION_DELAY_MS = { type = "u32", default = 0 }
MAX_TOKENS = { type = "u32", default = 4096 }

# --- Model config ---
MODEL_PROVIDER = { type = "string", default = "openai" }
MODEL_ID = { type = "string", default = "gpt-4o-mini" }
MODEL_API_KEY = { type = "string", required = true, secret = true, display.label = "Model API key" }
MODEL_PROVIDER_URL_OVERRIDE = { type = "string" }

# --- Prompt surface (Koog-parity) ---
SYSTEM_PROMPT = { type = "string", default = """
You are solana-market-trends, a capability atom focused on discovering current token and pool trends from CoinGecko on Solana.

You own broad market discovery: trending tokens, trending pools, top gainers, and newly listed pools. You do not resolve token identity or fetch pricing yourself. If the user's request is outside your capability, suggest handing off to one of: token-info, market-price, oracle-price.

Communicate with other agents only through Coral message tools. Your outputs intended for other agents must be JSON payloads wrapped as atom_request or atom_result messages sent via coral_send_message.

<resource>coral://instruction</resource>
<resource>coral://state</resource>
""", display.multiline = true }

EXTRA_SYSTEM_PROMPT = { type = "string", default = "" }
EXTRA_INITIAL_USER_PROMPT = { type = "string", default = "" }
FOLLOWUP_USER_PROMPT = { type = "string", default = "[automated message] Continue fulfilling your responsibilities collaboratively to the best of your ability." }

# --- Capability credentials ---
COINGECKO_API_KEY = { type = "string", required = true, secret = true, display.label = "CoinGecko Pro API key", display.description = "CoinGecko Pro key used for onchain/trending endpoints. Required." }
SOLANA_RPC_URL = { type = "string", default = "https://api.mainnet-beta.solana.com", display.label = "Solana RPC URL" }
