edition = 3

[agent]
name = "solana-kit"
version = "0.1.0"
description = "Modern @solana/kit SDK — RPC connections, signers, transaction building with pipe(), signing, sending, and account fetching with TypeScript."

[agent.license]
type = "spdx"
expression = "MIT"

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"

[options.OPENAI_API_KEY]
type = "string"
required = true
secret = true

[options.OPENAI_API_KEY.display]
description = "OpenAI API key for gpt-5.4-mini"
