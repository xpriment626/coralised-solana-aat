edition = 3

[agent]
name = "solana-quicknode"
version = "0.1.0"
description = "QuickNode infrastructure — RPC endpoints, DAS API, Yellowstone gRPC streaming, Priority Fee API, Streams, Webhooks, and Metis Jupiter integration."

[agent.license]
type = "spdx"
expression = "MIT"

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"

[options.OPENAI_API_KEY]
type = "string"
required = true
secret = true

[options.OPENAI_API_KEY.display]
description = "OpenAI API key for gpt-5.4-mini"
