edition = 3

[agent]
name = "solana-agent-kit"
version = "0.1.0"
description = "SendAI Solana Agent Kit — 60+ blockchain actions, LangChain/Vercel AI integration, MCP server setup, and autonomous agent patterns."

[agent.license]
type = "spdx"
expression = "MIT"

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"

[options.OPENAI_API_KEY]
type = "string"
required = true
secret = true

[options.OPENAI_API_KEY.display]
description = "OpenAI API key for gpt-5.4-mini"
