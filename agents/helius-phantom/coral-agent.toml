edition = 3

[agent]
name = "solana-helius-phantom"
version = "0.1.0"
description = "Combined Helius + Phantom frontend integration — React/React Native apps with Phantom Connect, Helius Sender, API key proxying, and secure frontend architecture."

[agent.license]
type = "spdx"
expression = "MIT"

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"

[options.OPENAI_API_KEY]
type = "string"
required = true
secret = true

[options.OPENAI_API_KEY.display]
description = "OpenAI API key for gpt-5.4-mini"
