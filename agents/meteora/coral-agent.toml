edition = 3

[agent]
name = "solana-meteora"
version = "0.1.0"
description = "Meteora DeFi operations — DLMM pools, DAMM, dynamic bonding curves, Alpha Vaults, token launches, and zap operations on Solana."

[agent.license]
type = "spdx"
expression = "MIT"

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"

[options.OPENAI_API_KEY]
type = "string"
required = true
secret = true

[options.OPENAI_API_KEY.display]
description = "OpenAI API key for gpt-5.4-mini"
