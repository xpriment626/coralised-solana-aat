edition = 3

[agent]
name = "solana-vulnhunter"
version = "0.1.0"
description = "Security vulnerability detection — dangerous APIs, footgun patterns, error-prone configurations, and variant analysis across Solana codebases."

[agent.license]
type = "spdx"
expression = "MIT"

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"

[options.OPENAI_API_KEY]
type = "string"
required = true
secret = true

[options.OPENAI_API_KEY.display]
description = "OpenAI API key for gpt-5.4-mini"
