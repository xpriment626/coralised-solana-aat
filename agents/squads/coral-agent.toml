edition = 3

[agent]
name = "solana-squads"
version = "0.1.0"
description = "Squads Protocol multisig and smart accounts — team treasury management, account abstraction, programmable wallets, and Grid stablecoin rails."

[agent.license]
type = "spdx"
expression = "MIT"

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"

[options.OPENAI_API_KEY]
type = "string"
required = true
secret = true

[options.OPENAI_API_KEY.display]
description = "OpenAI API key for gpt-5.4-mini"
