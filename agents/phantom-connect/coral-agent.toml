edition = 3

[agent]
name = "solana-phantom-connect"
version = "0.1.0"
description = "Phantom Connect SDK — wallet connection, social login, transaction signing, token gating, crypto payments, and NFT minting across React/React Native."

[agent.license]
type = "spdx"
expression = "MIT"

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"

[options.OPENAI_API_KEY]
type = "string"
required = true
secret = true

[options.OPENAI_API_KEY.display]
description = "OpenAI API key for gpt-5.4-mini"
