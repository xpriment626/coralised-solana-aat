edition = 3

[agent]
name = "solana-helius"
version = "0.1.0"
description = "Helius infrastructure — RPC, DAS API for NFTs/assets, real-time WebSocket/Laserstream streaming, webhooks, priority fees, and wallet analysis on Solana."

readme = "Helius infrastructure — RPC, DAS API for NFTs/assets, real-time WebSocket/Laserstream streaming, webhooks, priority fees, and wallet analysis on Solana."
summary = "Helius infrastructure — RPC, DAS API for NFTs/assets, real-time WebSocket/Laserstream streaming, webhooks, priority fees, and wallet analysis on Solana."

[agent.license]
type = "sdpx"
expression = "MIT"

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"

[options.OPENAI_API_KEY]
type = "string"
required = true
secret = true

[options.OPENAI_API_KEY.display]
description = "OpenAI API key for gpt-5.4-mini"
