edition = 3

[agent]
name = "solana-pumpfun"
version = "0.1.0"
description = "PumpFun token launch operations — bonding curve creation, buy/sell on curves, PumpSwap AMM, creator fees, and SDK integration on Solana."

[agent.license]
type = "spdx"
expression = "MIT"

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"

[options.OPENAI_API_KEY]
type = "string"
required = true
secret = true

[options.OPENAI_API_KEY.display]
description = "OpenAI API key for gpt-5.4-mini"
