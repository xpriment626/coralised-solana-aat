edition = 3

[agent]
name = "solana-lulo"
version = "0.1.0"
description = "Lulo lending aggregator — automated yield optimisation across Kamino, Drift, MarginFi, and Jupiter on Solana."

[agent.license]
type = "spdx"
expression = "MIT"

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"

[options.OPENAI_API_KEY]
type = "string"
required = true
secret = true

[options.OPENAI_API_KEY.display]
description = "OpenAI API key for gpt-5.4-mini"
