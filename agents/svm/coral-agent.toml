edition = 3

[agent]
name = "solana-svm"
version = "0.1.0"
description = "Solana architecture internals — SVM execution engine, account model, consensus, transactions, validator economics, and token extensions."

[agent.license]
type = "spdx"
expression = "MIT"

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"

[options.OPENAI_API_KEY]
type = "string"
required = true
secret = true

[options.OPENAI_API_KEY.display]
description = "OpenAI API key for gpt-5.4-mini"
