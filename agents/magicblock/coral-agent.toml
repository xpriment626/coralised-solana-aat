edition = 3

[agent]
name = "solana-magicblock"
version = "0.1.0"
description = "MagicBlock Ephemeral Rollups — sub-10ms latency, gasless transactions, Solana Plugins, and real-time gaming/HFT infrastructure."

[agent.license]
type = "spdx"
expression = "MIT"

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"

[options.OPENAI_API_KEY]
type = "string"
required = true
secret = true

[options.OPENAI_API_KEY.display]
description = "OpenAI API key for gpt-5.4-mini"
