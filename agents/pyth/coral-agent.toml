edition = 3

[agent]
name = "solana-pyth"
version = "0.1.0"
description = "Pyth Network oracle integration — real-time price feeds, confidence intervals, EMA prices, on-chain CPI, and streaming updates for Solana DeFi."

[agent.license]
type = "spdx"
expression = "MIT"

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"

[options.OPENAI_API_KEY]
type = "string"
required = true
secret = true

[options.OPENAI_API_KEY.display]
description = "OpenAI API key for gpt-5.4-mini"
